<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}} | Cadastrar imóvel para alugar</title>
  <link rel="icon" type="image/x-icon" href="/assets/icons/{{faviconFileName}}">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="./main.js"></script>
</head>

<body>
  <header>
    <a href="/index.html">
      <img src="/assets/images/{{logoFileName}}" alt="logo" />
    </a>
    <nav>
      <button onclick="logout()">Sair</button>
    </nav>
  </header>
  <main>
    <header>
      <h1>Cadastrar imóvel para alugar</h1>
      <a href="/administrativo/imoveis/alugar/index.html">
        {{iconArrowLeft}}
        <span>voltar</span>
      </a>
    </header>
    <form onsubmit="submitForm(event)">
      <div>
        <header>
          <h2>Status do imóvel</h2>
        </header>
        <div class="container">
          <fieldset>
            <label for="select_status_property">Situação atual</label>
            <select id="select_status_property">
              <option disabled selected hidden>Selecione</option>
              <option value="available">Disponível</option>
              <option value="rented">Alugado</option>
              <option value="maintenance">Em manutenção</option>
            </select>
          </fieldset>
          <fieldset>
            <label for="publish">Publicar</label>
            <select name="publish" id="publish">
              <option value="" disabled selected hidden>Selecione</option>
              <option value="true">Sim</option>
              <option value="false">Não</option>
            </select>
          </fieldset>
        </div>
      </div>
      <div>
        <header>
          <h2>Dados do imóvel</h2>
        </header>
        <div class="container">
          <fieldset>
            <label for="city">Cidade</label>
            <select name="city" id="city" onchange="handleCityChange()" onfocus="buildCities()">
              <option disabled selected hidden>Selecione</option>
            </select>
          </fieldset>
          <fieldset>
            <label for="district">Bairro</label>
            <select name="district" id="district">
              <option disabled selected hidden>Selecione</option>
            </select>
          </fieldset>
          <fieldset>
            <label for="street">Rua / Av. / Local</label>
            <input type="text" id="street" >
          </fieldset>
          <div class="item">
            <fieldset>
              <label for="number">Número</label>
              <input type="text" id="number" >
            </fieldset>
            <fieldset>
              <label for="complement">Complemento</label>
              <input type="text" id="complement">
            </fieldset>
          </div>
          <div class="item">
            <fieldset>
              <label for="type">Imóvel</label>
              <select name="type" id="type" onchange="handlePropertyTypeChange()">
                <option value="" disabled selected hidden>Selecione</option>
                <optgroup label="Residencial">
                  <option value="Apartamento">Apartamento</option>
                  <option value="Casa">Casa</option>
                  <option value="Kitnet">Kitnet</option>
                </optgroup>
                <optgroup label="Comercial">
                  <option value="Sala">Sala</option>
                  <option value="Loja">Loja</option>
                  <option value="Galpão">Galpão</option>
                </optgroup>
                <optgroup label="Rural">
                  <option value="Chácara">Chácara</option>
                  <option value="Sítio">Sítio</option>
                  <option value="Fazenda">Fazenda</option>
                </optgroup>
              </select>
            </fieldset>
            <fieldset>
              <label for="accept_pets">Aceita pets</label>
              <select name="accept_pets" id="accept_pets">
                <option value="" disabled selected hidden>Selecione</option>
                <option value="true">Sim</option>
                <option value="false">Não</option>
              </select>
            </fieldset>
          </div>
          <fieldset>
            <label for="rooms">Quartos</label>
            <select name="rooms" id="rooms">
              <option value="" disabled selected hidden>Selecione</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">+4</option>
            </select>
          </fieldset>
          <fieldset>
            <label for="bathrooms">Banheiros</label>
            <select name="bathrooms" id="bathrooms">
              <option value="" disabled selected hidden>Selecione</option>
              <option value="0">Não tem</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">+4</option>
            </select>
          </fieldset>
          <fieldset>
            <label for="garage_spaces">Garagens</label>
            <select name="garage_spaces" id="garage_spaces">
              <option value="" disabled selected hidden>Selecione</option>
              <option value="0">Não tem</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">+4</option>
            </select>
          </fieldset>
        </div>
      </div>
      <div>
        <header>
          <h2>Informações adicionais</h2>
        </header>
        <div class="container">
          <fieldset>
            <label for="owner">Proprietário</label>
            <input type="text" id="owner" >
          </fieldset>
          <fieldset id="camp_contact_owner">
            <label for="owner">Contato</label>
            <input type="text" id="contact" oninput="maskPhone(this)" >
          </fieldset>
          <div class="item">
            <fieldset>
              <label for="area">Área</label>
              <input type="text" id="area" inputmode="decimal" oninput="maskArea(this)">
            </fieldset>
            <fieldset>
              <label for="unity">Unidade de medida</label>
              <select name="unity" id="unity">
                <option value="" disabled selected hidden>Selecione</option>
                <option value="m²">m²</option>
                <option value="hectares">hectares</option>
                <option value="alqueire">alqueire</option>
              </select>
            </fieldset>
          </div>
          <fieldset id="camp_description">
            <label for="description">Descrição</label>
            <textarea maxlength="1000" name="description" id="description" rows="5" ></textarea>
          </fieldset>
        </div>
      </div>
      <div>
        <header>
          <h2>Imagens do imóvel</h2>
          <button onclick="addImageField()" type="button">+ adicionar</button>
        </header>
        <div class="container" id="images">
          <div class="image_field" data-field-id="1">
            <label class="image_box">
              <span class="placeholder">Enviar imagem</span>
              <input type="file" accept="image/*" multiple onchange="handleImageSelection(event, 1)" />
              <img class="preview" />
            </label>
            <button type="button" onclick="removeImageField(1)">Remover imagem</button>
          </div>
        </div>
      </div>
      <div>
        <header>
          <h2>Informações de faturamento</h2>
        </header>
        <div class="container">
          <fieldset>
            <label for="rent">Aluguel</label>
            <input type="text" id="rent" oninput="formatCurrency(this)">
          </fieldset>
        </div>
      </div>
      <div>
        <header>
          <h2>Despesas adicionais</h2>
          <button type="button" onclick="addCostsField()">+ adicionar</button>
        </header>
        <div class="container" id="costs">
          <div data-field-id="1">
            <fieldset>
              <label for="name_cost_1">Despesa</label>
              <select name="name_cost" id="name_cost_1">
                <option value="" disabled selected hidden>Selecione</option>
                <option value="Condomínio">Condomínio</option>
                <option value="IPTU">IPTU</option>
                <option value="Água">Água</option>
                <option value="Gás">Gás</option>
                <option value="Internet">Internet</option>
                <option value="Luz">Luz</option>
                <option value="Portaria">Portaria</option>
                <option value="Serviços extras">Serviços extras</option>
                <option value="TV a cabo">TV a cabo</option>
                <option value="Taxa de limpeza">Taxa de limpeza</option>
                <option value="Taxa de lixo">Taxa de lixo</option>
                <option value="Taxa de manutenção">Taxa de manutenção</option>
                <option value="Vaga de garagem">Vaga de garagem</option>
              </select>
            </fieldset>
            <div class="item">
              <fieldset>
                <label for="value_cost_1">Valor</label>
                <input type="text" name="value_cost" id="value_cost_1" oninput="formatCurrency(this)">
              </fieldset>
              <fieldset>
                <label for="frequency_cost_1">Frequência</label>
                <select name="frequency_cost" id="frequency_cost_1">
                  <option value="" disabled selected hidden>Selecione</option>
                  <option value="Mensal">Mensal</option>
                  <option value="Anual">Anual</option>
                  <option value="Única">Única</option>
                </select>
              </fieldset>
            </div>
            <button type="button" onclick="removeCostsField(1)">Remover despesa</button>
          </div>
        </div>
      </div>
      <footer>
        <header>
          <h2>Finalizar cadastro</h2>
        </header>
        <div>
          <button type="submit" class="save">Salvar</button>
        </div>
      </footer>
    </form>

    <dialog id="image_adjust_dialog" class="image_adjust_dialog">
      <div class="image_adjust_dialog_content">
        <header>
          <h2>Ajustar imagem</h2>
          <button type="button" class="image_adjust_dialog_close" onclick="closeImageAdjustDialog()">Fechar</button>
        </header>

        <div class="image_adjust_dialog_previews">
          <section>
            <h3>Celular</h3>
            <div class="image_adjust_dialog_frame image_adjust_dialog_frame_mobile">
              <img id="image_adjust_preview_mobile" alt="Prévia mobile da imagem" />
            </div>
          </section>

          <section>
            <h3>Computador</h3>
            <div class="image_adjust_dialog_frame image_adjust_dialog_frame_desktop">
              <img id="image_adjust_preview_desktop" alt="Prévia desktop da imagem" />
            </div>
          </section>
        </div>

        <div class="image_adjust_dialog_controls">
          <fieldset>
            <label for="image_adjust_x">Posição horizontal</label>
            <input type="range" id="image_adjust_x" min="0" max="100" value="50" oninput="handleImageAdjustChange()">
          </fieldset>

          <fieldset>
            <label for="image_adjust_y">Posição vertical</label>
            <input type="range" id="image_adjust_y" min="0" max="100" value="50" oninput="handleImageAdjustChange()">
          </fieldset>
        </div>
      </div>
    </dialog>

    <dialog id="loading">
      <div class="spinner">
        {{iconLoading}}
      </div>
      <span>Carregando...</span>
    </dialog>
  </main>
</body>

</html>
